---
- name: Deploy Student Feedback App
  hosts: local
  tasks:
    - name: Stop existing Docker container (if running)
      shell: docker stop student-feedback-container || true

    - name: Remove existing Docker container (if exists)
      shell: docker rm student-feedback-container || true

    - name: Run the new Docker container
      shell: docker run -d --name student-feedback-container -p 5000:5000 student-feedback-app